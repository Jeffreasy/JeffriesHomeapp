<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>Offline — Jeffries Dashboard</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #0a0a0f;
        color: #f1f5f9;
        font-family: Inter, system-ui, sans-serif;
        text-align: center;
        padding: 24px;
        color-scheme: dark;
      }
      main {
        max-width: 360px;
      }
      .icon {
        width: 48px;
        height: 48px;
        margin: 0 auto 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        border: 1px solid rgba(245, 158, 11, 0.2);
        background: rgba(245, 158, 11, 0.1);
        color: #fbbf24;
      }
      h1 {
        font-size: 18px;
        font-weight: 700;
        margin: 0 0 8px;
        color: #ffffff;
      }
      p {
        font-size: 13px;
        line-height: 20px;
        color: #94a3b8;
        margin: 0 0 16px;
      }
      button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: #12121a;
        color: #cbd5e1;
        font-size: 14px;
        font-family: inherit;
        cursor: pointer;
      }
      button:hover {
        background: #1a1a24;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon" aria-hidden="true">
        <svg
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="2" y1="2" x2="22" y2="22"></line>
          <path d="M8.5 16.5a5 5 0 0 1 7 0"></path>
          <path d="M2 8.82a15 15 0 0 1 4.17-2.65"></path>
          <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"></path>
          <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"></path>
          <path d="M5 13a10 10 0 0 1 5.24-2.76"></path>
          <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
      </div>
      <h1>Je bent offline</h1>
      <p>
        Deze pagina is niet beschikbaar zonder internetverbinding. Controleer je
        verbinding en probeer het opnieuw.
      </p>
      <button type="button" onclick="location.reload()">Opnieuw proberen</button>
    </main>
  </body>
</html>
