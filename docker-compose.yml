services:
  web:
    build:
      context: .
    command: npm run dev -- --hostname 0.0.0.0
    env_file:
      - .env.local
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped


